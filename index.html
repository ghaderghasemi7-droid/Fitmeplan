<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitPlan">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FitPlan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--surface3:#242424;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--muted:#777;--muted2:#aaa;
  --accent:#c8ff00;--accent-dim:rgba(200,255,0,0.10);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.97);backdrop-filter:blur(24px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;cursor:pointer;transition:color 0.15s;letter-spacing:.04em;text-transform:uppercase}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:19px}

.screen{display:none;padding-top:var(--safe-top);padding-bottom:calc(70px + var(--safe-bottom));min-height:100dvh}
.screen.active{display:block}

.page-header{padding:20px 16px 0;margin-bottom:14px}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;line-height:1}
.page-header p{font-size:12px;color:var(--muted);margin-top:3px}

.day-scroll{display:flex;gap:6px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}
.day-scroll::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;padding:6px 13px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.day-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.day-chip.rest{opacity:.6}

.cards{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 9px;border-bottom:0.5px solid var(--border)}
.card-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.card-time{font-size:11px;color:var(--muted)}
.card-body{padding:12px 14px}
.card-name{font-size:15px;font-weight:500;margin-bottom:5px}
.card-sub{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:8px}
.card-tip{font-size:12px;color:var(--muted2);background:var(--surface2);padding:8px 10px;margin-top:8px;border-left:2px solid var(--accent);border-radius:0 8px 8px 0}

.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.tag-back{background:rgba(79,195,247,.12);color:#4fc3f7}
.tag-leg{background:rgba(255,183,77,.12);color:#ffb74d}
.tag-shoulder{background:rgba(206,147,216,.12);color:#ce93d8}
.tag-other{background:rgba(255,255,255,.06);color:#999}
.tag-p{background:rgba(200,255,0,.10);color:#c8ff00}
.tag-k{background:rgba(255,183,77,.10);color:#ffb74d}
.tag-f{background:rgba(206,147,216,.10);color:#ce93d8}
.tag-cal{background:rgba(255,255,255,.05);color:#999}
.priority{font-size:10px;padding:1px 6px;background:var(--accent-dim);color:var(--accent);border-radius:4px;margin-left:5px}

.sets-badge{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);display:inline-block;margin-bottom:2px}

.track-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.track-label{font-size:11px;color:var(--muted)}
.track-input{width:62px;padding:6px 8px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;text-align:center}
.track-input:focus{outline:none;border-color:var(--accent)}
.track-unit{font-size:11px;color:var(--muted)}
.track-saved{font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;margin-left:4px}
.track-saved.show{opacity:1}

.week-summary{margin:0 16px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:14px}
.week-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.week-ex-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.week-ex-name{font-size:11px;color:var(--muted2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-bar-wrap{flex:1.5;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.week-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.week-ex-val{font-size:11px;color:var(--accent);min-width:70px;text-align:right}

.rest-card{margin:0 16px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.rest-card .ri{font-size:30px;margin-bottom:6px}
.rest-card h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted)}
.rest-card p{font-size:12px;color:var(--muted);margin-top:4px}

.totals-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 16px;margin-bottom:12px}
.total-chip{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center}
.total-chip .tv{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--accent)}
.total-chip .tl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.day-note{margin:10px 16px 0;background:var(--surface2);border-left:2px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--muted2)}
.day-note strong{color:var(--text)}

.shop-section{margin:0 16px 14px}
.shop-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-left:2px}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:5px;cursor:pointer;transition:opacity .15s}
.shop-item.checked{opacity:.35}
.shop-check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.shop-item.checked .shop-check{background:var(--accent);border-color:var(--accent);color:#000}
.shop-item-name{font-size:13px;flex:1}
.shop-item-qty{font-size:11px;color:var(--muted)}
.shop-clear{display:block;width:100%;padding:8px;margin-top:4px;background:none;border:0.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer}
.shop-progress{padding:0 16px;margin-bottom:14px}
.shop-prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
.shop-prog-label{font-size:12px;color:var(--muted)}
.shop-prog-val{font-size:12px;color:var(--accent)}
.shop-prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.shop-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

.recipe-card{margin:0 16px 8px;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;overflow:hidden}
.recipe-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.recipe-title{font-size:14px;font-weight:500}
.recipe-meta{font-size:11px;color:var(--muted);margin-top:2px}
.recipe-chevron{color:var(--muted);font-size:13px;transition:transform .2s}
.recipe-card.open .recipe-chevron{transform:rotate(180deg)}
.recipe-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border)}
.recipe-card.open .recipe-body{display:block}
.recipe-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:12px 0 6px}
.recipe-ing{font-size:13px;color:var(--muted2);padding:5px 0;border-bottom:0.5px solid var(--border)}
.recipe-ing:last-of-type{border-bottom:none}
.recipe-step{display:flex;gap:10px;margin-bottom:8px}
.step-num{width:22px;height:22px;background:var(--accent-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent);flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;color:var(--muted2);line-height:1.6}
.recipe-tip{background:var(--surface2);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 10px;font-size:12px;color:var(--muted2);margin-top:8px}

.weight-card{margin:0 16px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:14px}
.weight-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.weight-input-row{display:flex;gap:8px;margin-bottom:12px}
.weight-input-row input{flex:1;padding:10px 12px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif}
.weight-input-row input:focus{outline:none;border-color:var(--accent)}
.weight-input-row button{padding:10px 16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.weight-entry{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)}
.weight-entry:last-child{border-bottom:none}
.weight-date{font-size:12px;color:var(--muted)}
.weight-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
.weight-diff{font-size:11px}
.weight-diff.up{color:#ff6b6b}
.weight-diff.down{color:var(--accent)}
.weight-empty{font-size:13px;color:var(--muted);text-align:center;padding:16px 0}

.spacer{height:16px}
</style>
</head>
<body>

<div id="screen-training" class="screen active">
  <div class="page-header"><h1>Training</h1><p>Fokus: Rücken · Beine · Schultern</p></div>
  <div id="week-summary-box"></div>
  <div class="day-scroll" id="train-days"></div>
  <div id="train-content"></div>
</div>

<div id="screen-nutrition" class="screen">
  <div class="page-header"><h1>Ernährung</h1><p>2700 kcal · 125g Protein täglich</p></div>
  <div class="day-scroll" id="nutr-days"></div>
  <div id="nutr-content"></div>
</div>

<div id="screen-shopping" class="screen">
  <div class="page-header"><h1>Einkaufsliste</h1><p>Wochenbedarf für Meal Prep</p></div>
  <div class="shop-progress" id="shop-progress"></div>
  <div id="shop-content"></div>
</div>

<div id="screen-recipes" class="screen">
  <div class="page-header"><h1>Meal Prep</h1><p>Rezepte für die Wochenvorbereitung</p></div>
  <div id="recipes-content"></div>
</div>

<div id="screen-progress" class="screen">
  <div class="page-header"><h1>Fortschritt</h1><p>Gewicht & Wochenübersicht</p></div>
  <div id="progress-content"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchScreen('training',this)"><span class="nav-icon">💪</span>Training</button>
  <button class="nav-btn" onclick="switchScreen('nutrition',this)"><span class="nav-icon">🥗</span>Essen</button>
  <button class="nav-btn" onclick="switchScreen('shopping',this)"><span class="nav-icon">🛒</span>Einkauf</button>
  <button class="nav-btn" onclick="switchScreen('recipes',this)"><span class="nav-icon">📋</span>Rezepte</button>
  <button class="nav-btn" onclick="switchScreen('progress',this)"><span class="nav-icon">📈</span>Progress</button>
</nav>

// ── STORAGE ────────────────────────────────────────────────────────────

function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}

const weekKey=()=>{const d=new Date(),j=new Date(d.getFullYear(),0,1);return`w${Math.ceil((((d-j)/86400000)+j.getDay()+1)/7)}_${d.getFullYear()}`};

let tracking=load('tracking',{});

const mClass=m=>(['Rücken','Beinbizeps'].includes(m)?'tag-back':['Quadrizeps','Gesäß','Adduktoren','Hüftbeuger'].includes(m)?'tag-leg':['Schultern','hint.Schulter'].includes(m)?'tag-shoulder':'tag-other');
const tKey=(id,f)=>`${weekKey()}_${id}_${f}`;
function saveTrack(id,f,v){tracking[tKey(id,f)]=v;save('tracking',tracking)}
function loadTrack(id,f){return tracking[tKey(id,f)]||''}

function renderWeekSummary(){
  let rows='';
  TRAIN_DAYS.filter(d=>d.type==='train').forEach(day=>{
    day.exercises.filter(e=>e.priority).slice(0,2).forEach(ex=>{
      const wt=loadTrack(ex.id,'weight'),rp=loadTrack(ex.id,'reps'),done=wt||rp;
      rows+=`<div class="week-ex-row">
        <div class="week-ex-name">${ex.name}</div>
        <div class="week-bar-wrap"><div class="week-bar" style="width:${done?100:0}%"></div></div>
        <div class="week-ex-val">${done?(wt?wt+'kg ':'')+(rp?rp+' Wdh':''):'–'}</div>
      </div>`;
    });
  });
  document.getElementById('week-summary-box').innerHTML=`<div class="week-summary"><div class="week-title">Diese Woche · Prioritätsübungen</div>${rows||'<p style="font-size:12px;color:var(--muted)">Noch keine Einträge. Training starten und Gewichte eintragen.</p>'}</div>`;
}

    </div></div>`).join('')}</div><div class="spacer"></div>`;return;
  }
  const ft=d.focus.map(f=>`<span class="tag ${f==='Rücken'?'tag-back':f==='Schultern'?'tag-shoulder':'tag-leg'}">${f}</span>`).join('');
  el.innerHTML=`<div style="padding:0 16px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--muted)">${d.duration}</span><span style="color:var(--border)">·</span>${ft}</div>
  <div class="cards">${d.exercises.map(e=>{
    const wt=loadTrack(e.id,'weight'),rp=loadTrack(e.id,'reps');
    return`<div class="card"><div class="card-body">
      <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:3px">
        <span class="sets-badge">${e.sets}×${e.reps}</span>${e.priority?'<span class="priority">Priorität</span>':''}
      </div>

      <div class="card-sub" style="margin-bottom:6px">${e.eq}</div>
      <div class="tags" style="margin-bottom:8px">${e.muscles.map(m=>`<span class="tag ${mClass(m)}">${m}</span>`).join('')}</div>
      <div class="card-tip">${e.tip}</div>
      <div class="track-row">
        <span class="track-label">Gewicht</span>
        <input class="track-input" type="number" inputmode="decimal" placeholder="–" value="${wt}" onchange="doTrack('${e.id}','weight',this.value)">
        <span class="track-unit">kg</span>
        <span class="track-label" style="margin-left:4px">Wdh</span>
        <input class="track-input" type="number" inputmode="numeric" placeholder="–" value="${rp}" onchange="doTrack('${e.id}','reps',this.value)">

      </div>
    </div></div>`;
  }).join('')}</div><div class="spacer"></div>`;

function doTrack(id,f,v){
  saveTrack(id,f,v);
  const el=document.getElementById('sv_'+id);
  if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
  renderWeekSummary();
}

function renderShopping(){
  const total=SHOPPING.reduce((a,c)=>a+c.items.length,0);

  const pct=Math.round(checked/total*100);
  document.getElementById('shop-progress').innerHTML=`<div class="shop-prog-row"><span class="shop-prog-label">${checked} von ${total} Artikeln</span><span class="shop-prog-val">${pct}%</span></div><div class="shop-prog-bar"><div class="shop-prog-fill" style="width:${pct}%"></div></div>`;
  document.getElementById('shop-content').innerHTML=SHOPPING.map(cat=>`<div class="shop-section">
    <div class="shop-section-title">${cat.category}</div>
    ${cat.items.map(item=>{const k=cat.category+'_'+item.name,c=shopChecked[k];return`<div class="shop-item ${c?'checked':''}" onclick="toggleShop('${k}')"><div class="shop-check">${c?'✓':''}</div><span class="shop-item-name">${item.name}</span><span class="shop-item-qty">${item.qty}</span></div>`;}).join('')}
    <button class="shop-clear" onclick="clearCat('${cat.category}')">Kategorie zurücksetzen</button>
  </div>`).join('')+'<div class="spacer"></div>';
}

function toggleShop(k){shopChecked[k]=!shopChecked[k];save('shopChecked',shopChecked);renderShopping()}
function clearCat(cat){SHOPPING.find(c=>c.category===cat).items.forEach(i=>{delete shopChecked[cat+'_'+i.name]});save('shopChecked',shopChecked);renderShopping()}

function renderProgress(){
  const last5=weightLog.slice(-5);
  const hist=weightLog.length===0?'<div class="weight-empty">Noch kein Gewicht eingetragen.</div>'
    :[...weightLog].reverse().slice(0,8).map((e,i,arr)=>{
      const prev=arr[i+1];let dh='';
      if(prev){const df=(e.weight-prev.weight).toFixed(1);dh=`<span class="weight-diff ${df>0?'up':'down'}">${df>0?'+':''}${df} kg</span>`}
      return`<div class="weight-entry"><span class="weight-date">${e.date}</span><div style="display:flex;align-items:baseline;gap:8px">${dh}<span class="weight-val">${e.weight} kg</span></div></div>`;
    }).join('');

  let chart='';
  if(last5.length>=2){
    const vals=last5.map(e=>e.weight),mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,W=300,H=70;
    const pts=vals.map((v,i)=>`${(i/(vals.length-1))*(W-20)+10},${H-((v-mn)/(mx-mn))*(H-10)-5}`).join(' ');
    chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:70px;margin-top:12px">
      <polyline points="${pts}" fill="none" stroke="#c8ff00" stroke-width="2" stroke-linejoin="round"/>
      ${vals.map((v,i)=>{const x=(i/(vals.length-1))*(W-20)+10,y=H-((v-mn)/(mx-mn))*(H-10)-5;return`<circle cx="${x}" cy="${y}" r="3" fill="#c8ff00"/><text x="${x}" y="${y-7}" text-anchor="middle" fill="#c8ff00" font-size="9" font-family="DM Sans">${v}</text>`}).join('')}
    </svg>`;
  }

  let trackRows='';
  TRAIN_DAYS.forEach(day=>{if(day.type==='train')day.exercises.filter(e=>e.priority).forEach(e=>{
    const wt=loadTrack(e.id,'weight'),rp=loadTrack(e.id,'reps'),done=wt||rp;
    trackRows+=`<div class="week-ex-row"><div class="week-ex-name">${day.label} · ${e.name}</div><div class="week-bar-wrap"><div class="week-bar" style="width:${done?100:0}%"></div></div><div class="week-ex-val">${done?(wt?wt+'kg ':'')+(rp?rp+' Wdh':''):'–'}</div></div>`;
  })});

  document.getElementById('progress-content').innerHTML=`
  <div class="weight-card">
    <div class="weight-title">Gewicht eintragen</div>
    <div class="weight-input-row">
      <input type="number" inputmode="decimal" step="0.1" placeholder="77.5" id="wi">
      <button onclick="addWeight()">Speichern</button>
    </div>
    ${chart}
    <div style="margin-top:12px">${hist}</div>
  </div>
  <div class="week-summary" style="margin:0 16px">
    <div class="week-title">Wöchentliches Training · Übersicht</div>
    ${trackRows||'<p style="font-size:12px;color:var(--muted)">Noch kein Training eingetragen. Geh auf Training und trage deine Gewichte ein.</p>'}
  </div>
  <div class="spacer"></div>`;
}

function addWeight(){
  const inp=document.getElementById('wi'),v=parseFloat(inp.value);
  if(!v||v<30||v>300)return;
  const today=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
  weightLog.push({date:today,weight:v});save('weightLog',weightLog);
  inp.value='';renderProgress();
}

// ── SCREEN ────────────────────────────────────────────────────────────

function switchScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='shopping')renderShopping();
  if(name==='recipes')renderRecipes();
  if(name==='progress')renderProgress();
}

// ── SERVICE WORKER ────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');

// ── INIT ──────────────────────────────────────────────────────────────
const todayIdx=[6,0,1,2,3,4,5][new Date().getDay()];
trainDay=todayIdx;nutrDay=todayIdx;
renderTrainDays();renderWeekSummary();renderTrainContent();
renderNutrDays();renderNutrContent();
</script>
</body>
</html>
